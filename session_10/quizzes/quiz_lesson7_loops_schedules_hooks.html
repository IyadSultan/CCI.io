<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz: Loops, Schedules & Hooks</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
    .back-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; font-weight: 600; color: #00838F; text-decoration: none; padding: 0.35rem 0.65rem; border-radius: 0.4rem; border: 1px solid #80DEEA; background: #E0F7FA; margin-bottom: 1rem; }
    .back-link:hover { background: #B2EBF2; }
</style>
</head>
<body>
  <a class="back-link" href="/CCI.io/session-10/">&#8249; Back to Session 10</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

const questions = [
  {
    question: "What is the difference between a `PreToolUse` hook and a `PostToolUse` hook?",
    options: [
      "PreToolUse runs once at session start; PostToolUse runs once at session end",
      "PreToolUse fires before Claude uses a tool and can block the action; PostToolUse fires after a tool runs and can react but cannot block",
      "PreToolUse is for bash commands only; PostToolUse is for file edits only",
      "PreToolUse is for user-level hooks; PostToolUse is for project-level hooks"
    ],
    correct: 1,
    explanation: "`PreToolUse` fires before the tool runs and can refuse the action by exiting non-zero — this is your safety hard-stop (block `rm -rf`, block writes to the eval table). `PostToolUse` fires after the tool completes; the action already happened, so it cannot block, but it can react: auto-format the file, run a linter, append to an audit log, send a notification."
  },
  {
    question: "You want a job that summarizes yesterday's pipeline errors every morning at 6 AM. Loop, schedule, or hook?",
    options: [
      "Loop — Claude keeps checking until errors are zero",
      "Schedule — a cron job that runs `claude -p` once at 6 AM with a tight allowlist",
      "Hook — fire on PreToolUse for every bash command",
      "All three at once"
    ],
    correct: 1,
    explanation: "This is the textbook schedule. The job happens at a fixed time, runs once, exits. A loop is for 'keep going until done' (long, listy refactors). A hook is for 'fire at a moment in a session.' A 6 AM daily summary needs cron (or Windows Task Scheduler) plus headless mode (`claude -p`) with a surgically tight `--allowedTools`."
  },
  {
    question: "What does the `Stop` hook do in a Ralph loop?",
    options: [
      "Stops the loop after the first iteration",
      "Fires when Claude tries to end its turn — can block the exit and inject a 'keep going' message, which is what keeps the Ralph loop running for hours",
      "Sends a notification when the loop is done",
      "Limits the maximum iteration count"
    ],
    correct: 1,
    explanation: "The `Stop` hook is the engine of the Ralph loop. Every time Claude tries to end its turn, the hook fires. It checks the completion promise (e.g., 'every box in todo.md is checked AND pytest exits zero'). If the promise is not met, it exits non-zero to block Claude's exit and writes a 'keep going' message to its stdout, which becomes Claude's next prompt. Repeat until the promise is satisfied or the iteration cap is hit."
  },
  {
    question: "Why is a hook a better place than `CLAUDE.md` for a non-negotiable rule like 'do not write to `aidi_catalog.dbo.eval_runs` outside an eval session'?",
    options: [
      "Hooks are faster than CLAUDE.md",
      "Hooks always fire — they are plumbing, not advice. CLAUDE.md is a suggestion Claude usually follows; a hook is a requirement Claude cannot bypass",
      "CLAUDE.md only works on weekdays",
      "Hooks are easier to write than CLAUDE.md entries"
    ],
    correct: 1,
    explanation: "This is the central distinction. `CLAUDE.md` is text the model reads and *usually* follows. 'Usually' is fine for coding style. It is not fine for 'do not corrupt the eval baseline.' A hook is plumbing — it always fires, costs zero tokens, and cannot be reasoned around by the model. Rule of thumb: suggestions go in CLAUDE.md; requirements go in hooks."
  },
  {
    question: "In a Ralph loop, what does the completion promise prevent?",
    options: [
      "Claude from using bash tools",
      "An infinite loop — without a promise the hook can actually verify ('pytest exits zero AND every box is checked'), the hook has no way to recognize 'done' and never stops",
      "The session from costing more than $10",
      "Subagents from being spawned"
    ],
    correct: 1,
    explanation: "The completion promise is what gives the Stop hook the criterion to recognize 'done.' Without it — or with a vague promise like 'until it's good' — the hook will keep injecting 'keep going' messages and the loop runs forever (or, more realistically, until your `--max-iterations` cap fires). The promise and the cap are the two non-negotiable guardrails on any Ralph loop."
  }
];

function App() {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExplanation, setShowExplanation] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);

  const handleSelect = (idx) => {
    if (showExplanation) return;
    setSelected(idx);
    setShowExplanation(true);
    if (idx === questions[current].correct) setScore(s => s + 1);
  };

  const next = () => {
    if (current + 1 >= questions.length) { setFinished(true); return; }
    setCurrent(c => c + 1);
    setSelected(null);
    setShowExplanation(false);
  };

  const restart = () => {
    setCurrent(0); setSelected(null); setShowExplanation(false); setScore(0); setFinished(false);
  };

  if (finished) {
    return (
      <div style={{ maxWidth: 700, margin: '40px auto', fontFamily: 'system-ui', textAlign: 'center' }}>
        <h2>Quiz Complete!</h2>
        <p style={{ fontSize: 24 }}>Score: {score} / {questions.length}</p>
        <div style={{ background: score >= 4 ? '#d4edda' : score >= 3 ? '#fff3cd' : '#f8d7da', padding: 20, borderRadius: 8, margin: 20 }}>
          {score >= 4 ? "Excellent! You understand the three patterns — loops, schedules, hooks — and how they compose." : score >= 3 ? "Good foundation — re-read the Pre vs Post and completion-promise sections." : "Review the lesson before the capstone — the eval-suite Stop hook is the discipline that makes Lessons 8 and 9 shippable."}
        </div>
        <button onClick={restart} style={{ padding: '10px 24px', fontSize: 16, cursor: 'pointer', borderRadius: 6, border: 'none', background: '#0d6efd', color: '#fff' }}>Retry Quiz</button>
      </div>
    );
  }

  const q = questions[current];
  return (
    <div style={{ maxWidth: 700, margin: '40px auto', fontFamily: 'system-ui' }}>
      <div style={{ background: '#e9ecef', borderRadius: 8, height: 8, marginBottom: 20 }}>
        <div style={{ background: '#0d6efd', borderRadius: 8, height: 8, width: `${((current + 1) / questions.length) * 100}%`, transition: 'width 0.3s' }} />
      </div>
      <p style={{ color: '#666', marginBottom: 4 }}>Question {current + 1} of {questions.length}</p>
      <h3 style={{ marginBottom: 16 }}>{q.question}</h3>
      {q.options.map((opt, i) => (
        <div key={i} onClick={() => handleSelect(i)} style={{
          padding: '12px 16px', margin: '8px 0', borderRadius: 8, cursor: showExplanation ? 'default' : 'pointer',
          border: `2px solid ${showExplanation ? (i === q.correct ? '#198754' : i === selected ? '#dc3545' : '#dee2e6') : selected === i ? '#0d6efd' : '#dee2e6'}`,
          background: showExplanation ? (i === q.correct ? '#d4edda' : i === selected && i !== q.correct ? '#f8d7da' : '#fff') : '#fff'
        }}>{opt}</div>
      ))}
      {showExplanation && (
        <div style={{ background: '#f0f4ff', padding: 16, borderRadius: 8, marginTop: 12, borderLeft: '4px solid #0d6efd' }}>
          <strong>Explanation:</strong> {q.explanation}
        </div>
      )}
      {showExplanation && <button onClick={next} style={{ marginTop: 16, padding: '10px 24px', fontSize: 16, cursor: 'pointer', borderRadius: 6, border: 'none', background: '#0d6efd', color: '#fff' }}>{current + 1 < questions.length ? 'Next Question' : 'See Results'}</button>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
