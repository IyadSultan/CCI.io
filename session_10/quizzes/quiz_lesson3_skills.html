<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz: Claude Code Skills</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
    .back-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; font-weight: 600; color: #00838F; text-decoration: none; padding: 0.35rem 0.65rem; border-radius: 0.4rem; border: 1px solid #80DEEA; background: #E0F7FA; margin-bottom: 1rem; }
    .back-link:hover { background: #B2EBF2; }
</style>
</head>
<body>
  <a class="back-link" href="/CCI.io/session-10/">&#8249; Back to Session 10</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

const questions = [
  {
    question: "What is the key behavioural difference between a CLAUDE.md rule and a skill?",
    options: [
      "CLAUDE.md is older syntax; skills replace it in newer Claude Code versions",
      "CLAUDE.md loads on every session (always-on rules); a skill loads only when its description matches the user's request (conditional playbooks)",
      "CLAUDE.md is for code; skills are for documentation",
      "CLAUDE.md is per-project; skills are per-user only"
    ],
    correct: 1,
    explanation: "CLAUDE.md is the always-on rule book — universal conventions, security rules, model defaults. Skills are conditional playbooks Claude pulls in only when the task in front of it matches the skill's description. Putting conditional content in CLAUDE.md costs tokens every turn forever; putting universal rules in a skill means they sometimes don't load."
  },
  {
    question: "What does the `description` field in a skill's frontmatter actually do?",
    options: [
      "It is purely documentation for humans — Claude ignores it",
      "It is the text Claude reads at session start to decide whether the skill applies to the user's request; it is the trigger",
      "It sets the skill's filename",
      "It controls which model the skill runs against"
    ],
    correct: 1,
    explanation: "The description is the skill's contract with Claude. Claude reads every installed skill's description at the start of a session, and when the user phrases a request that matches one, that skill's playbook is loaded. Vague descriptions (\"for pathology stuff\") trigger on everything and become noise. Specific descriptions (\"Use when the user asks to extract T-stage, margins, grade from a path report\") trigger when they should."
  },
  {
    question: "A skill has SKILL.md plus a 200-line references/tumor-staging-pitfalls.md. When does the reference file actually get read by Claude?",
    options: [
      "At session start, alongside the description",
      "When the skill first fires (when SKILL.md loads)",
      "Only at the moment, mid-task, when SKILL.md tells Claude to read it",
      "Never — references are for human teammates only"
    ],
    correct: 2,
    explanation: "This is the context trick that makes skills cheap. Only the short description costs tokens at session start. SKILL.md loads when the skill fires. Reference files load only at the moment SKILL.md references them mid-task. A skill can carry hundreds of pages of reference material at near-zero baseline cost."
  },
  {
    question: "What is the trigger difference between a skill and a slash command?",
    options: [
      "There is no difference; they are aliases",
      "A slash command is explicit (you type /commit); a skill is implicit (Claude matches your plain-English request against the skill's description)",
      "A slash command needs the model to be set to Sonnet; a skill works on Haiku",
      "A skill is older and being deprecated in favour of slash commands"
    ],
    correct: 1,
    explanation: "Slash commands are typed verbs you invoke yourself (`/commit`, `/eval`). Skills are recognised by Claude from a plain-English request. Rule of thumb: if the trigger is a verb you'd type, make it a slash command. If the trigger is a kind of task you want Claude to recognise on its own (the user pasted a path report), make it a skill."
  },
  {
    question: "What does the `/config` output style setting (Explanatory / Concise / Technical) actually control?",
    options: [
      "Which model Claude uses for the session",
      "How verbose, narrative, and technical Claude's responses are — same question, three different voices",
      "Whether Claude can access the network",
      "The maximum number of tokens per response"
    ],
    correct: 1,
    explanation: "Output styles change the voice of Claude's replies. Explanatory narrates the reasoning (good for learning). Concise gives the answer in two lines (good for routine work). Technical uses precise terminology and code (good for pair-programming). Same prompt, three meaningfully different replies. Pick the voice that suits the moment; Concise is the right default once you are past the learning phase."
  }
];

function App() {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExplanation, setShowExplanation] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);

  const handleSelect = (idx) => {
    if (showExplanation) return;
    setSelected(idx);
    setShowExplanation(true);
    if (idx === questions[current].correct) setScore(s => s + 1);
  };

  const next = () => {
    if (current + 1 >= questions.length) { setFinished(true); return; }
    setCurrent(c => c + 1);
    setSelected(null);
    setShowExplanation(false);
  };

  const restart = () => {
    setCurrent(0); setSelected(null); setShowExplanation(false); setScore(0); setFinished(false);
  };

  if (finished) {
    return (
      <div style={{ maxWidth: 700, margin: '40px auto', fontFamily: 'system-ui', textAlign: 'center' }}>
        <h2>Quiz Complete!</h2>
        <p style={{ fontSize: 24 }}>Score: {score} / {questions.length}</p>
        <div style={{ background: score >= 4 ? '#d4edda' : score >= 3 ? '#fff3cd' : '#f8d7da', padding: 20, borderRadius: 8, margin: 20 }}>
          {score >= 4 ? "Excellent — you understand the skill model." : score >= 3 ? "Good — re-read the section on descriptions and the context trick." : "Review the lesson before moving on; the skill/CLAUDE.md distinction is foundational."}
        </div>
        <button onClick={restart} style={{ padding: '10px 24px', fontSize: 16, cursor: 'pointer', borderRadius: 6, border: 'none', background: '#0d6efd', color: '#fff' }}>Retry Quiz</button>
      </div>
    );
  }

  const q = questions[current];
  return (
    <div style={{ maxWidth: 700, margin: '40px auto', fontFamily: 'system-ui' }}>
      <div style={{ background: '#e9ecef', borderRadius: 8, height: 8, marginBottom: 20 }}>
        <div style={{ background: '#0d6efd', borderRadius: 8, height: 8, width: `${((current + 1) / questions.length) * 100}%`, transition: 'width 0.3s' }} />
      </div>
      <p style={{ color: '#666', marginBottom: 4 }}>Question {current + 1} of {questions.length}</p>
      <h3 style={{ marginBottom: 16 }}>{q.question}</h3>
      {q.options.map((opt, i) => (
        <div key={i} onClick={() => handleSelect(i)} style={{
          padding: '12px 16px', margin: '8px 0', borderRadius: 8, cursor: showExplanation ? 'default' : 'pointer',
          border: `2px solid ${showExplanation ? (i === q.correct ? '#198754' : i === selected ? '#dc3545' : '#dee2e6') : selected === i ? '#0d6efd' : '#dee2e6'}`,
          background: showExplanation ? (i === q.correct ? '#d4edda' : i === selected && i !== q.correct ? '#f8d7da' : '#fff') : '#fff'
        }}>{opt}</div>
      ))}
      {showExplanation && (
        <div style={{ background: '#f0f4ff', padding: 16, borderRadius: 8, marginTop: 12, borderLeft: '4px solid #0d6efd' }}>
          <strong>Explanation:</strong> {q.explanation}
        </div>
      )}
      {showExplanation && <button onClick={next} style={{ marginTop: 16, padding: '10px 24px', fontSize: 16, cursor: 'pointer', borderRadius: 6, border: 'none', background: '#0d6efd', color: '#fff' }}>{current + 1 < questions.length ? 'Next Question' : 'See Results'}</button>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
