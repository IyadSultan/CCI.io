<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz: PRD-Builder Skill</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
    .back-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; font-weight: 600; color: #00838F; text-decoration: none; padding: 0.35rem 0.65rem; border-radius: 0.4rem; border: 1px solid #80DEEA; background: #E0F7FA; margin-bottom: 1rem; }
    .back-link:hover { background: #B2EBF2; }
</style>
</head>
<body>
  <a class="back-link" href="/CCI.io/session-10/">&#8249; Back to Session 10</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

const questions = [
  {
    question: "What problem does writing a PRD before coding actually prevent?",
    options: [
      "It makes the code run faster at runtime",
      "It prevents the 'build-then-realize' failure mode — discovering after two weeks of work that the tool does not solve the user's real problem",
      "It satisfies a regulatory requirement from the FDA for clinical software",
      "It is required by GitHub before you can create a repository"
    ],
    correct: 1,
    explanation: "A PRD is the contract between the person who wants the tool and the person (or agent) who builds it. The cost of a missing requirement at PRD time is a sentence; the cost of the same missing requirement after two weeks of coding is two weeks of coding. The medical analogy is the study protocol you write before opening an IRB submission — you do not enroll patients first and figure out inclusion criteria later."
  },
  {
    question: "You ask the PRD-Builder skill to draft a PRD for a Databricks pipeline that flags neutropenic fever in oncology inpatients from VISTA labs and emails the on-call hem-onc fellow. Which template will the skill apply?",
    options: [
      "The generic software PRD template",
      "The AIDI clinical PRD template — the input mentions KHCC data sources (VISTA), a clinical workflow, oncology patients, and an ACS-style email alert",
      "Neither — the skill will refuse because the description is too clinical",
      "Both templates merged together"
    ],
    correct: 1,
    explanation: "The skill auto-classifies. Signals that triggered the AIDI clinical template here: VISTA tables, clinical pipeline, oncology patient population, alert to a named on-call clinician. The AIDI clinical template has 20 sections including Clinical Context, Data Sources, Validation against the deceased-patient cohort, and Compliance — none of which fit a generic browser extension or marketing site."
  },
  {
    question: "In the first draft of a PRD, you see the marker '[TBD]' under 'Alert recipient escalation path' and '[assumed — confirm]' next to 'GPT-4.1-mini' in the LLM section. What do these markers mean?",
    options: [
      "They are errors — the skill failed and you should re-run it",
      "[TBD] = a real gap the user must answer; [assumed — confirm] = a sensible inference from the standard AIDI stack that the user should verify. Both are surfaced under Open Questions so nothing is silently invented.",
      "[TBD] means the section is finished; [assumed — confirm] means it is not",
      "They are placeholders that the skill will fill in automatically on the next run"
    ],
    correct: 1,
    explanation: "Every PRD has gaps. The discipline is to surface them in one place rather than guess and bury them in prose. [TBD] is a genuine unknown. [assumed — confirm] is the skill telling you 'I assumed the standard AIDI stack here — confirm or override.' A v1 PRD with zero markers is almost certainly lying."
  },
  {
    question: "The PRD-Builder skill's workflow says it should 'always checkpoint before drafting.' What does that actually mean in practice?",
    options: [
      "Always ask the user a long list of questions about every section before drafting anything",
      "Confirm direction before drafting — but only ask about genuine gaps in the five critical sections. If everything is answered, post a one-line confirmation and draft in the same turn rather than nagging.",
      "Save the draft as a checkpoint file every five minutes during writing",
      "Wait 24 hours before producing the draft so the user can change their mind"
    ],
    correct: 1,
    explanation: "The skill never drafts blindly on the first turn — that is the always-checkpoint rule. But it scales the checkpoint to what is actually missing: focused batched questions when there are gaps, a brief one-line confirmation when the input is already complete. The point is to clear real blockers, not interrogate the user about nice-to-haves."
  },
  {
    question: "Which of the following is the WRONG situation to invoke the PRD-Builder skill?",
    options: [
      "You are planning a new Databricks pipeline to detect sepsis in ICU adults",
      "You want to build a small internal Django app for charge nurses to log bolus events",
      "You need to run a one-off ad-hoc SQL query to pull last quarter's vancomycin troughs into a CSV for an afternoon analysis",
      "A clinical champion has dictated a brain-dump about a new dashboard idea and you need to structure it"
    ],
    correct: 2,
    explanation: "PRDs are for products — things you intend to ship, run on a schedule, or hand to another human. A throwaway ad-hoc query is not a product; the SKILL.md itself says one-line pitches and one-off scripts do not warrant a PRD. The other three are exactly what the skill is for: a pipeline, an internal app, and a brain-dump that needs structuring."
  }
];

function App() {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExplanation, setShowExplanation] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);

  const handleSelect = (idx) => {
    if (showExplanation) return;
    setSelected(idx);
    setShowExplanation(true);
    if (idx === questions[current].correct) setScore(s => s + 1);
  };

  const next = () => {
    if (current + 1 >= questions.length) { setFinished(true); return; }
    setCurrent(c => c + 1);
    setSelected(null);
    setShowExplanation(false);
  };

  const restart = () => {
    setCurrent(0); setSelected(null); setShowExplanation(false); setScore(0); setFinished(false);
  };

  if (finished) {
    return (
      <div style={{ maxWidth: 700, margin: '40px auto', fontFamily: 'system-ui', textAlign: 'center' }}>
        <h2>Quiz Complete!</h2>
        <p style={{ fontSize: 24 }}>Score: {score} / {questions.length}</p>
        <div style={{ background: score >= 4 ? '#d4edda' : score >= 3 ? '#fff3cd' : '#f8d7da', padding: 20, borderRadius: 8, margin: 20 }}>
          {score >= 4 ? "Excellent — you understand the skill's classify/checkpoint/draft flow and what [TBD] markers mean." : score >= 3 ? "Good — review when to pick AIDI clinical vs generic and the role of Open Questions." : "Review the lesson — the PRD-Builder workflow is foundational to the rest of Session 10."}
        </div>
        <button onClick={restart} style={{ padding: '10px 24px', fontSize: 16, cursor: 'pointer', borderRadius: 6, border: 'none', background: '#0d6efd', color: '#fff' }}>Retry Quiz</button>
      </div>
    );
  }

  const q = questions[current];
  return (
    <div style={{ maxWidth: 700, margin: '40px auto', fontFamily: 'system-ui' }}>
      <div style={{ background: '#e9ecef', borderRadius: 8, height: 8, marginBottom: 20 }}>
        <div style={{ background: '#0d6efd', borderRadius: 8, height: 8, width: `${((current + 1) / questions.length) * 100}%`, transition: 'width 0.3s' }} />
      </div>
      <p style={{ color: '#666', marginBottom: 4 }}>Question {current + 1} of {questions.length}</p>
      <h3 style={{ marginBottom: 16 }}>{q.question}</h3>
      {q.options.map((opt, i) => (
        <div key={i} onClick={() => handleSelect(i)} style={{
          padding: '12px 16px', margin: '8px 0', borderRadius: 8, cursor: showExplanation ? 'default' : 'pointer',
          border: `2px solid ${showExplanation ? (i === q.correct ? '#198754' : i === selected ? '#dc3545' : '#dee2e6') : selected === i ? '#0d6efd' : '#dee2e6'}`,
          background: showExplanation ? (i === q.correct ? '#d4edda' : i === selected && i !== q.correct ? '#f8d7da' : '#fff') : '#fff'
        }}>{opt}</div>
      ))}
      {showExplanation && (
        <div style={{ background: '#f0f4ff', padding: 16, borderRadius: 8, marginTop: 12, borderLeft: '4px solid #0d6efd' }}>
          <strong>Explanation:</strong> {q.explanation}
        </div>
      )}
      {showExplanation && <button onClick={next} style={{ marginTop: 16, padding: '10px 24px', fontSize: 16, cursor: 'pointer', borderRadius: 6, border: 'none', background: '#0d6efd', color: '#fff' }}>{current + 1 < questions.length ? 'Next Question' : 'See Results'}</button>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
