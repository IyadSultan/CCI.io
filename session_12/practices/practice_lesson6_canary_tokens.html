<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice: Canary Tokens — Good Practice or Mistake?</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
    .back-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; font-weight: 600; color: #6A1B9A; text-decoration: none; padding: 0.35rem 0.65rem; border-radius: 0.4rem; border: 1px solid #CE93D8; background: #F3E5F5; margin-bottom: 1rem; }
    .back-link:hover { background: #E1BEE7; }
</style>
</head>
<body>
  <a class="back-link" href="/CCI.io/session-12/">&#8249; Back to Session 12</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

// Lesson 6 practice — "Good practice or mistake?"
// Sort each canary-token decision. Tap to choose, then Check.

const BUCKETS = ['Good practice', 'Mistake'];
const COLORS = { 'Good practice': '#198754', 'Mistake': '#dc3545' };

const ITEMS = [
  { item: 'Send the canary alert to your own email address', answer: 'Good practice',
    reason: 'A canary is detection on your own assets — the alert goes to you, the owner.' },
  { item: 'Put a real patient list inside the decoy so it looks convincing', answer: 'Mistake',
    reason: 'Never. Real PHI in a decoy is itself a PHI exposure — you would build the breach you set out to catch.' },
  { item: 'Write a memo noting where and when you planted the token', answer: 'Good practice',
    reason: 'When an alert arrives months later, the memo makes it instantly make sense instead of a context-free panic.' },
  { item: 'Plant a token on a colleague’s personal laptop to monitor them', answer: 'Mistake',
    reason: 'A canary is for your own property, with authority. Aimed at others, it becomes surveillance.' },
  { item: 'Treat the source IP in an alert as proof of who opened it', answer: 'Mistake',
    reason: 'An IP can be a VPN, proxy, or shared connection — a lead, not an identity. It is smoke, not courtroom proof.' },
  { item: 'Place the decoy on a busy folder half the floor opens daily', answer: 'Mistake',
    reason: 'High-traffic placement fires constantly and you learn to ignore it. Plant where touches are rare and meaningful.' },
];

function App() {
  const [choice, setChoice] = useState({});
  const [checked, setChecked] = useState(false);

  const cycle = (i) => {
    if (checked) return;
    setChoice((prev) => {
      const cur = prev[i];
      const nextIdx = cur === undefined ? 0 : (BUCKETS.indexOf(cur) + 1) % BUCKETS.length;
      return { ...prev, [i]: BUCKETS[nextIdx] };
    });
  };

  const reset = () => { setChoice({}); setChecked(false); };
  const picked = (i) => choice[i];
  const isCorrect = (i) => picked(i) === ITEMS[i].answer;
  const allAnswered = ITEMS.every((_, i) => picked(i) !== undefined);
  const score = ITEMS.reduce((n, _, i) => n + (isCorrect(i) ? 1 : 0), 0);

  const cardStyle = (i) => {
    const base = { border: '2px solid #ced4da', borderRadius: 8, padding: '12px 16px', margin: '10px 0',
      cursor: checked ? 'default' : 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12 };
    if (!checked) return base;
    return isCorrect(i)
      ? { ...base, border: '2px solid #198754', background: '#d4edda' }
      : { ...base, border: '2px solid #dc3545', background: '#f8d7da' };
  };

  return (
    <div style={{ maxWidth: 820, margin: '40px auto', fontFamily: 'system-ui', color: '#212529' }}>
      <h1>Canary tokens: good practice or mistake?</h1>
      <div style={{ background: '#f8f9fa', padding: 16, borderRadius: 8, marginBottom: 20 }}>
        A canary token is a burglar alarm in your own house — detection on your own property, ethically.
        Tap each decision to sort it, then press <strong>Check</strong>.
      </div>

      {ITEMS.map((it, i) => (
        <div key={i} style={cardStyle(i)} onClick={() => cycle(i)}>
          <span style={{ flex: 1 }}>{it.item}</span>
          <span style={{
            minWidth: 140, textAlign: 'center', padding: '6px 10px', borderRadius: 6, fontSize: 14,
            color: '#fff', background: picked(i) ? COLORS[picked(i)] : '#adb5bd',
          }}>
            {picked(i) || 'tap to choose'}
          </span>
        </div>
      ))}

      {checked && (
        <div style={{ marginTop: 8 }}>
          {ITEMS.map((it, i) => (
            <p key={i} style={{ margin: '6px 0', color: isCorrect(i) ? '#198754' : '#dc3545' }}>
              {isCorrect(i) ? '✓' : '✗'} {it.answer}. {it.reason}
            </p>
          ))}
        </div>
      )}

      <div style={{ marginTop: 16 }}>
        {!checked
          ? <button onClick={() => setChecked(true)} disabled={!allAnswered}
              style={{ padding: '10px 24px', fontSize: 16, borderRadius: 6, border: 'none',
                background: allAnswered ? '#0d6efd' : '#adb5bd', color: '#fff',
                cursor: allAnswered ? 'pointer' : 'not-allowed' }}>Check</button>
          : <button onClick={reset}
              style={{ padding: '10px 24px', fontSize: 16, borderRadius: 6, border: 'none', background: '#6c757d', color: '#fff', cursor: 'pointer' }}>Try Again</button>}
      </div>

      {checked && (
        <div style={{ background: '#f0f4ff', padding: 16, borderRadius: 8, marginTop: 16, borderLeft: '4px solid #0d6efd' }}>
          <strong>Score: {score} / {ITEMS.length}.</strong> Keep it pointed inward: your assets, your email,
          your authority, fake bait, low-traffic placement — and read the IP as a lead, never as identity.
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
